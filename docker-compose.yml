services:
  mysql:
    image: mysql:8.4
    container_name: allfood-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: allfood_db
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - allfood_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allfood-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/allfood_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-abcd1234}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  allfood_mysql_data:
